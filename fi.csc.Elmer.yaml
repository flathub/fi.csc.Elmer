app-id: fi.csc.Elmer
runtime: org.kde.Platform
sdk: org.kde.Sdk
runtime-version: 5.15-25.08
command: ElmerGUI
finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/cmake
  - /share/aclocal
  - /share/pkgconfig
  - /share/man
  - /share/doc
  - /share/opencascade/data
  - /doc
  - /man
  - '*.la'
  - '*.a'

modules:
  - shared-modules/glu/glu-9.json

    # Elemer need qwt_compat.h which is remove in 6.2.0. Next Elmer version should support the new Qwt.
  - name: qwt
    buildsystem: qmake
    config-opts:
      - -after
      - QWT_INSTALL_PREFIX=/app
    sources:
      - type: archive
        url: https://sourceforge.net/projects/qwt/files/qwt/6.1.6/qwt-6.1.6.tar.bz2
        sha256: 99460d31c115ee4117b0175d885f47c2c590d784206f09815dc058fbe5ede1f6
      - type: shell
        commands:
          - sed 's/QWT_INSTALL_PREFIX\s*=\s*\/usr\/local\/qwt-$$QWT_VERSION/QWT_INSTALL_PREFIX=\/app/g'
            -i qwtconfig.pri
          - sed 's/#QWT_CONFIG\s*+=\s*QwtPkgConfig/QWT_CONFIG+=QwtPkgConfig/g' -i
            qwtconfig.pri

  - name: OpenBLAS
    no-autogen: true
    make-args:
      - DYNAMIC_ARCH=1
      - DYNAMIC_OLDER=1
      - FC=gfortran
      - USE_OPENMP=0
    make-install-args:
      - PREFIX=/app
    arch:
      x86_64:
        make-args:
          - TARGET=GENERIC
      aarch64:
        make-args:
          - TARGET=ARMV8
    cleanup:
      - /bin
      - /include
      - /lib/cmake
      - /lib/*.a
      - /lib/*.la
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.30/OpenBLAS-0.3.30.tar.gz
        sha256: 27342cff518646afb4c2b976d809102e368957974c250a25ccc965e53063c95d
        x-checker-data:
          type: anitya
          project-id: 2540
          stable-only: true
          url-template: https://github.com/OpenMathLib/OpenBLAS/releases/download/v%version/OpenBLAS-%version.tar.gz

  - name: openmpi
    config-opts:
      - --disable-static
      - --enable-mpi-c
      - --enable-mpi-fortran=all
    sources:
      - type: archive
        url: https://download.open-mpi.org/release/open-mpi/v5.0/openmpi-5.0.9.tar.bz2
        sha256: dfb72762531170847af3e4a0f21d77d7b23cf36f67ce7ce9033659273677d80b
        x-checker-data:
          type: anitya
          project-id: 2554
          stable-only: true
          url-template: https://download.open-mpi.org/release/open-mpi/v${major}.${minor}/openmpi-$version.tar.bz2

  - name: hdf5
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_TESTING:BOOL=OFF
      - -DHDF5_BUILD_EXAMPLES:BOOL=OFF
      - -DHDF5_ENABLE_Z_LIB_SUPPORT:BOOL=ON
      - -DDEFAULT_API_VERSION:STRING=v18
    cleanup:
      - /share/hdf5_examples
    sources:
      - type: archive
        url: https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1.14.6.tar.gz
        sha256: 6df53f84376d87e96eeb255703e3b1a348fc08a48e06e37053f1bfb379970189
        x-checker-data:
          type: anitya
          project-id: 1303
          stable-only: true
          url-template: https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-$version.tar.gz

  - name: netcdf
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://github.com/Unidata/netcdf-c/archive/v4.9.3.tar.gz
        sha256: 990f46d49525d6ab5dc4249f8684c6deeaf54de6fec63a187e9fb382cc0ffdff
        x-checker-data:
          type: anitya
          project-id: 10354
          stable-only: true
          url-template: https://github.com/Unidata/netcdf-c/archive/v$version.tar.gz

  - name: Hypre
    subdir: src
    build-options:
      cflags: -fPIC
      cxxflags: -fPIC
    sources:
      - type: git
        url: https://github.com/hypre-space/hypre.git
        commit: 9dc9e18aed6a945a95f966e57daacfb1c269f6ec
        tag: v3.1.0
        x-checker-data:
          type: git
          tag-pattern: ^(v[\d._]+)$

    # cmake-ninja failed
  - name: SCOTCH
    buildsystem: cmake
    sources:
      - type: archive
        # url: https://gitlab.inria.fr/scotch/scotch/-/archive/v7.0.1/scotch-v7.0.1.tar.bz2
        # sha256: 4ce908798ebdf0ae8dc7899a51bbebe6f274c195e28ecbb29724681eee31a6af
        url: https://gitlab.inria.fr/scotch/scotch/-/archive/v7.0.11/scotch-v7.0.11.tar.bz2
        sha256: 82fb468485b153a41031e50a7ca668fccbd3b8561d31dc7535da4210dde01f48
        x-checker-data:
          type: anitya
          project-id: 12358
          stable-only: true
          url-template: https://gitlab.inria.fr/scotch/scotch/-/archive/v$version/scotch-v$version.tar.bz2

  - name: metis
    buildsystem: cmake
    sources:
      - type: git
        url: https://github.com/scivision/metis
        commit: 6ce8b56366a7b052e0b422d307dd3c4192e4b29c
        tag: v5.2.1.2

  - name: parmetis
    buildsystem: cmake
    config-opts:
      - -DFETCHCONTENT_SOURCE_DIR_METIS=/run/build/parmetis/metis-src
      - -DFETCHCONTENT_SOURCE_DIR_GKLIB=/run/build/parmetis/gklib-src
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: git
        url: https://github.com/scivision/parmetis.git
        branch: main
        commit: 175ffe29d7980360a4253cbedb978873e8002bfb
        disable-submodules: true
      - type: archive
        url: https://github.com/scivision/METIS/archive/456244e99d7f0027706033d18bc1b3424d3507cc.tar.gz
        sha256: c4ec016a6161330b2ccf0b85be6d8dbdf45370be4b985ebcb2950e0d8cdbf722
        dest: metis-src
      - type: archive
        url: https://github.com/scivision/GKlib/archive/b4c45d104d421d3adb85fb900ca240eba781c95f.tar.gz
        sha256: 053c5d49137345d16256046190916c7aeaff3e80510e7a998625c4af4ecabe6b
        dest: gklib-src

  - name: mumps
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DLAPACK_LIBRARY=/app/lib/libopenblas.so
      - -DLAPACK_LIBRARIES=/app/lib/libopenblas.so
      - -DBLAS_LIBRARY=/app/lib/libopenblas.so
      - -DBLAS_LIBRARIES=/app/lib/libopenblas.so
      - -DMUMPS_parallel=ON
      - -DMUMPS_scalapack=OFF
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_COMPLEX=ON
      - -DBUILD_COMPLEX16=ON
      - -DFETCHCONTENT_SOURCE_DIR_MUMPS_UPSTREAM=/run/build/mumps/mumps-upstream-src
    sources:
      - type: git
        url: https://github.com/scivision/mumps.git
        tag: v5.9.0.3
        commit: 3b79a655b7abc62ee5bef56782925580e68bf284
      - type: archive
        url: https://mumps-solver.org/MUMPS_5.9.0.tar.gz
        sha256: 02c6efdb91749ec0f82351d40f3f860547272a1eb1d899126a4265b4d6bcc4ca
        dest: mumps-upstream-src
  - name: libXmu
    cleanup:
      - /share/doc
    sources:
      - type: archive
        url: https://www.x.org/archive/individual/lib/libXmu-1.3.1.tar.gz
        sha256: 5c8f44e26ccc9b14188599524e67ce788a205b38e297834babdeb12090be835b
        x-checker-data:
          type: anitya
          project-id: 1785
          stable-only: true
          url-template: https://www.x.org/archive/individual/lib/libXmu-$version.tar.gz

  # - name: OCE
  #   buildsystem: cmake-ninja
  #   config-opts:
  #     - -D3RDPARTY_TK_INCLUDE_DIR:PATH=/app/include
  #   sources:
  #     - type: git
  #       url: https://github.com/tpaviot/oce.git
  #       tag: upstream/V7_5_0
  #       commit: 29cf1a701ca269df10f2d1c4037e2826cf704355
  #       x-checker-data:
  #         type: git
  #         tag-pattern: ^(upstream/V[\d._]+)$

  - name: Eigen3
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://gitlab.com/libeigen/eigen/-/archive/5.0.1/eigen-5.0.1.tar.bz2
        sha256: e4de6b08f33fd8b8985d2f204381408c660bffa6170ac65b68ae1bd3cd575c0a
        x-checker-data:
          type: anitya
          project-id: 13751
          stable-only: true
          url-template: https://gitlab.com/libeigen/eigen/-/archive/$version/eigen-$version.tar.bz2


  - name: opencascade
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_MODULE_Draw=OFF
      - -DUSE_TCL=OFF
      - -DUSE_TK=OFF
      - -DUSE_FREEIMAGE=OFF
      - -DUSE_VTK=OFF
      - -DUSE_RAPIDJSON=OFF
      - -DBUILD_RELEASE_DISABLE_EXCEPTIONS=OFF
      - -DBUILD_DOC_Overview=OFF
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://github.com/FreeCAD/OCCT.git
        commit: 8db1faa32e326889fc770b4389629d686ccb52d5
        tag: patched/V7_8_1
      - type: patch
        path: occt-freetype-fix-compilation.patch

  - name: netgen
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DUSE_GUI=OFF
      - -DUSE_PYTHON=OFF
      - -DUSE_OCC=ON
    sources:
      - type: git
        url: https://github.com/NGsolve/netgen.git
        tag: v6.2.2604
        commit: 3ee489c7d58fdbc2a6708cca3cbaefaae506dc17

    # Only work with VTK 9.1.0 for Elemr 9
    # Only work with VTK 9.1.0 for Elemr 9
  - name: VTK-9
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DOpenGL_GL_PREFERENCE=GLVND
      - -DBUILD_TESTING:BOOL=OFF
      - -DVTK_USE_SYSTEM_ZLIB:BOOL=ON
      - -DVTK_USE_SYSTEM_EIGEN:BOOL=ON
      - -DVTK_GROUP_ENABLE_Qt=YES
      - -DCMAKE_BUILD_TYPE=Release
      - -DVTK_LEGACY_REMOVE:BOOL=OFF
      - -DVTK_USE_MPI:BOOL=ON
      - -DVTK_GROUP_ENABLE_MPI=YES
    sources:
      - type: archive
        url: https://vtk.org/files/release/9.5/VTK-9.5.2.tar.gz
        sha256: cee64b98d270ff7302daf1ef13458dff5d5ac1ecb45d47723835f7f7d562c989
        x-checker-data:
          type: anitya
          project-id: 15084
          stable-only: true
          url-template: https://www.vtk.org/files/release/$major.$minor/VTK-$version.tar.gz

    # Elmer is looking for libMPI::MPI_C, but no clue what it is actually.
  - name: create-link-MPI
    buildsystem: simple
    build-commands:
      - ln -s /app/lib/libMPI.so /app/lib/libMPI::MPI_C.so

  - name: TBB
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DTBB_TEST:BOOL=OFF
      - -DTBB_EXAMPLES:BOOL=OFF
    sources:
      - type: archive
        url: https://github.com/oneapi-src/oneTBB/archive/refs/tags/v2022.3.0.tar.gz
        sha256: 01598a46c1162c27253a0de0236f520fd8ee8166e9ebb84a4243574f88e6e50a
        x-checker-data:
          type: anitya
          project-id: 227581
          stable-only: true
          url-template: https://github.com/oneapi-src/oneTBB/archive/refs/tags/v$version.tar.gz

    # Elmer does not build with newer version like 17.0.0 which
    # remove depreciated package like ML.
  - name: Trilinos
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      cflags: -fPIC
      cxxflags: -fPIC
    config-opts:
      - -DBLA_VENDOR=OpenBLAS
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DCMAKE_INSTALL_LIBDIR=lib
      - -DTrilinos_ENABLE_ML=ON
      - -DTrilinos_ENABLE_INSTALL_CMAKE_CONFIG_FILES=ON
      - -DTrilinos_ENABLE_TESTS=OFF
      - -DTPL_ENABLE_MPI=ON
      - -DTrilinos_ENABLE_Belos=ON
      - -DTrilinos_ENABLE_Epetra=ON
    sources:
      - type: git
        url: https://github.com/trilinos/Trilinos.git
        tag: trilinos-release-16-2-0
        commit: f4d642715185dca1b94c91f434a2cf6db9f82014

  - name: Elmer
    buildsystem: cmake #ninja failed
    builddir: true
    build-options:
      env:
        CC: mpicc
        CXX: mpicxx
        FC: mpifort
    config-opts:
      - -DBLA_VENDOR=OpenBLAS
      - -DCMAKE_BUILD_TYPE:STRING=RelWithDebInfo
      - -DWITH_MPI:BOOL=TRUE
      - -DWITH_OpenMP:BOOL=TRUE
      - -DWITH_MKL:BOOL=FALSE # Seems difficult to compile
      - -DWITH_Hypre:BOOL=TRUE
      - -DWITH_ScatteredDataInterpolator=TRUE
      - -DWITH_ElmerIce:BOOL=TRUE
      - -DWITH_ELMERGUI:BOOL=TRUE
      - -DWITH_ELMERGUILOGGER:BOOL=TRUE
      - -DWITH_Trilinos:BOOL=TRUE
      - -DWITH_FETI4I:BOOL=FALSE # does not detect by Elmer, don't know why.
      - -DWITH_CONTRIB:BOOL=TRUE
      - -DWITH_Mumps:BOOL=TRUE
      - -DWITH_OpenCASCADE:BOOL=TRUE
      - -DWITH_QT5:BOOL=TRUE
      - -DWITH_VTK:BOOL=TRUE
      - -DWITH_LUA:BOOL=TRUE
      - -DWITH_MATC:BOOL=ON
      - -DWITH_Zoltan:BOOL=FALSE # Set to false to not conflict with one from Trilinos
      - -DUSE_CONTIGUOUS:BOOL=FALSE
      - -DCMAKE_PREFIX_PATH=/app
      - -DSCALAPACK_LIBRARIES=/app/lib/libopenblas.so
      - -DML_DIR=/app/lib/cmake/ML
      - -DTrilinos_DIR=/app/lib/cmake/Trilinos
      - -DNETCDF_INCLUDE_DIR=/app/include
      - -DNETCDF_LIBRARY=/app/lib/
    post-install:
      - install -Dm0644 ../pics/ElmerLogoPlain128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
      - install -Dm0644 ../${FLATPAK_ID}.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm0644 ../${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
    sources:
      - type: git
        url: https://github.com/ElmerCSC/elmerfem.git
        tag: release-26.2.1
        commit: a19504ac53ec222e3355e182b08f2ff280c2203a
        disable-submodules: true # If false, Failed to download sources: module Elmer: Not a gitlink tree: elmeric/include/mmg
        x-checker-data:
          type: git
          tag-pattern: ^(release-[\d.]+)$
      - type: git
        url: https://github.com/ElmerCSC/Zoltan.git
        dest: contrib/Zoltan_v3.83
        commit: 7345f7cb26739d5ac2e9308d03fb0d1c5d6dc54f
      - type: git
        url: https://github.com/MmgTools/mmg
        dest: elmerice/include/mmg
        tag: v5.6.0
        commit: 889d408419b5c48833c249695987cf6ec699d399
      - type: file
        path: fi.csc.Elmer.desktop
      - type: file
        path: fi.csc.Elmer.metainfo.xml

  - name: Elmer-Tetgen-plugin
    buildsystem: qmake
    subdir: misc/tetgen_plugin/
    config-opts:
      - tetgen_plugin.pro
    build-options:
      env:
        ELMER_HOME: /app
    sources:
      - type: git
        url: https://github.com/ElmerCSC/elmerfem.git
        tag: release-26.2.1
        commit: a19504ac53ec222e3355e182b08f2ff280c2203a
        disable-submodules: true
        x-checker-data:
          type: git

  - name: test
    buildsystem: simple
    build-commands:
      - cmake --version
      - gcc --version
